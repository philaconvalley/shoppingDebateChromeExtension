<!DOCTYPE html>
<html>
<head>
    <title>Speechify API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            font-size: 16px;
            cursor: pointer;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 400px;
            overflow-y: auto;
        }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>Speechify API Test</h1>
    <p>This will test if your Speechify API key is working correctly.</p>

    <button onclick="testVoices()">Test Henry Voice</button>
    <button onclick="testListVoices()">List Available Voices</button>
    <button onclick="clearOutput()">Clear Output</button>

    <div id="output"></div>

    <script>
        const API_KEY = 'E83y8sU8rB6uHh_CRWF26gGF5-_vMSfBrt5-rlqzes8=';
        const API_BASE = 'https://api.sws.speechify.com/v1';

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const line = document.createElement('div');
            line.className = type;
            line.textContent = new Date().toISOString().split('T')[1].split('.')[0] + ' - ' + message;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
        }

        async function testListVoices() {
            log('Fetching available voices...', 'info');

            try {
                const response = await fetch(`${API_BASE}/voices`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`
                    }
                });

                log(`Response status: ${response.status}`, response.ok ? 'success' : 'error');

                if (!response.ok) {
                    const errorText = await response.text();
                    log(`Error: ${errorText}`, 'error');
                    return;
                }

                const voices = await response.json();
                log(`Found ${voices.voices?.length || 0} voices:`, 'success');

                if (voices.voices) {
                    voices.voices.forEach(voice => {
                        log(`  - ${voice.name} (${voice.voice_id})`, 'info');
                    });
                } else {
                    log(JSON.stringify(voices, null, 2), 'info');
                }

            } catch (error) {
                log(`Error: ${error.message}`, 'error');
            }
        }

        async function testVoices() {
            const testText = "Hello! This is a test of the shopping debate voice system.";
            const voiceId = "henry";

            log(`Testing voice: ${voiceId}`, 'info');
            log(`Text: "${testText}"`, 'info');

            try {
                log('Sending request to Speechify API...', 'info');

                const response = await fetch(`${API_BASE}/audio/speech`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        input: testText,
                        voice_id: voiceId,
                        model: 'simba-english',
                        speed: 1.0
                    })
                });

                log(`Response status: ${response.status}`, response.ok ? 'success' : 'error');
                log(`Response type: ${response.headers.get('content-type')}`, 'info');

                if (!response.ok) {
                    const errorText = await response.text();
                    log(`Error response: ${errorText}`, 'error');
                    return;
                }

                const audioBlob = await response.blob();
                log(`Audio blob size: ${audioBlob.size} bytes`, 'success');
                log(`Audio blob type: ${audioBlob.type}`, 'info');

                // Convert to base64
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result;
                    log(`Base64 length: ${base64.length}`, 'info');

                    // Play the audio
                    log('Creating audio element and playing...', 'info');
                    const audio = new Audio(base64);

                    audio.addEventListener('canplay', () => {
                        log('Audio can play! Duration: ' + audio.duration + 's', 'success');
                    });

                    audio.addEventListener('playing', () => {
                        log('Audio is playing!', 'success');
                    });

                    audio.addEventListener('ended', () => {
                        log('Audio finished playing', 'success');
                    });

                    audio.addEventListener('error', (e) => {
                        log(`Audio playback error: ${e.message || 'Unknown error'}`, 'error');
                    });

                    audio.play().then(() => {
                        log('Play() promise resolved', 'success');
                    }).catch(err => {
                        log(`Play() failed: ${err.message}`, 'error');
                    });
                };

                reader.onerror = (error) => {
                    log(`FileReader error: ${error}`, 'error');
                };

                reader.readAsDataURL(audioBlob);

            } catch (error) {
                log(`Test failed: ${error.message}`, 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
