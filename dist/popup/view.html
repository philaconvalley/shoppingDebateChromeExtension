<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Debate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Shopping Debate</h1>
  <p class="subtitle">AI personalities debate your purchases</p>

  <div class="status">
    <span class="status-indicator"></span>
    Extension is active
  </div>

  <div class="reminders-section">
    <h3>Pending Reminders</h3>
    <div id="remindersList" class="reminder-list">
      <div class="no-reminders">No reminders set</div>
    </div>
  </div>

  <div class="model-quick-select">
    <h3>Quick Model Switch</h3>
    <label class="model-label">+ Enabler</label>
    <select id="quickModelEnabler">
      <option value="anthropic/claude-3-haiku">Claude Haiku</option>
      <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
      <option value="anthropic/claude-3-opus">Claude Opus</option>
      <option value="openai/gpt-3.5-turbo">GPT-3.5</option>
      <option value="openai/gpt-4-turbo">GPT-4 Turbo</option>
    </select>

    <label class="model-label">? Skeptic</label>
    <select id="quickModelSkeptic">
      <option value="anthropic/claude-3-haiku">Claude Haiku</option>
      <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
      <option value="anthropic/claude-3-opus">Claude Opus</option>
      <option value="openai/gpt-3.5-turbo">GPT-3.5</option>
      <option value="openai/gpt-4-turbo">GPT-4 Turbo</option>
    </select>

    <label class="model-label">= Mediator</label>
    <select id="quickModelMediator">
      <option value="anthropic/claude-3-haiku">Claude Haiku</option>
      <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
      <option value="anthropic/claude-3-opus">Claude Opus</option>
      <option value="openai/gpt-3.5-turbo">GPT-3.5</option>
      <option value="openai/gpt-4-turbo">GPT-4 Turbo</option>
    </select>

    <a href="#" id="openSettings" class="settings-link">More options →</a>
  </div>

  <div class="actions">
    <button id="testDebate" class="btn-primary">Test on This Page</button>
  </div>

  <div class="footer">
    Automatically triggers on checkout pages
  </div>

  <script src="controller.js"></script>
</body>
</html>
